app:
  site_name: NewsReporter Daily Briefing
  timezone: UTC
  window_hours: 24
  top_items: 8

summarizer:
  mode: llm
  arxiv_mode: llm
  llm:
    model: gemini-2.5-flash
    timeout_seconds: 20
    max_input_chars: 4000
    max_output_chars: 280

paths:
  database: data/state.db
  output_site: output/site
  output_preview: output/preview/site
  templates: src/web/templates
  static: src/web/static

scoring:
  source_weights:
    rss_news: 0
  keywords:
    - Infrastructure
    - CUDA
    - Distributed
    - Inference
    - Reinforcement
    - Policy
    - Reward
    - Alignment
    - Diffusion
    - Generative
    - Synthesis
    - Sampling
    - Multimodal
    - Vision
    - Modality
    - Perception
    - Agent
    - Planning
    - Reasoning
    - Memory
  arxiv:
    topic_weight: 6
    category_bonus: 8
    keywords:
      - reasoning
      - planning
      - reinforcement
      - diffusion
      - multimodal
      - inference
      - training
      - optimization
      - kernel
      - gpu
      - memory
    core_categories:
      - cs.ai
      - cs.lg
      - cs.cl
      - cs.cv
